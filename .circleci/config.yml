version: 2.1

jobs:
  lambdatest_selenium_testng:
    docker:
      - image: cimg/openjdk:11.0
    working_directory: ~/project
    environment:
      MAVEN_OPTS: "-Dmaven.repo.local=~/project/.m2/repository"
    steps:
      - checkout

      - restore_cache:
          keys:
            - maven-repo-v1-{{ checksum "pom.xml" }}
            - maven-repo-v1-

      - run:
          name: Run TestNG suite on LambdaTest
          command: mvn --batch-mode --errors --fail-at-end --show-version test

      - save_cache:
          key: maven-repo-v1-{{ checksum "pom.xml" }}
          paths:
            - .m2/repository

      - store_test_results:
          path: target/surefire-reports

      - store_artifacts:
          path: target/surefire-reports
          destination: surefire-reports

workflows:
  test:
    jobs:
      - lambdatest_selenium_testng
